    .nf-orb{

    .nf-main{

    .nf-astronaut-wrap{

      width:96px;height:96px;border-radius:50%;margin-bottom:1.25rem;
      background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(6,182,212,.1));
      border:1px solid rgba(99,102,241,.2);
      animation:nfFloat 4s ease-in-out infinite;
    }
    .nf-astronaut-wrap i{font-size:2.6rem;background:var(--primary-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    @keyframes nfFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
    @media(prefers-reduced-motion:reduce){.nf-astronaut-wrap{animation:none;}}

    /* ── 404 number ── */
    .nf-code{
      font-size:clamp(5.5rem,18vw,9.5rem);font-weight:800;line-height:1;
      background:linear-gradient(135deg,#4f46e5,#06b6d4);

    .nf-cancel-btn{background:none;border:none;color:var(--text-muted);font-size:.78rem;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:3px;}

<script>
  // Countdown redirect
  (function(){
    let s = 10;
    const el  = document.getElementById('nfTimer');
    const btn = document.getElementById('nfCancelBtn');
    const iv  = setInterval(function(){
      s--;
      if(el) el.textContent = s;
      if(s <= 0){ clearInterval(iv); location.href = 'index.html'; }
    }, 1000);
    btn.addEventListener('click', function(){
      clearInterval(iv);
      btn.closest('p').remove();
    });
  })();
</script>
