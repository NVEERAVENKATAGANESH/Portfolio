<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Ganesh Portfolio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="Portfolio.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;}
    .err-code{font-size:clamp(5rem,20vw,9rem);font-weight:900;line-height:1;background:linear-gradient(135deg,#4f46e5,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .err-title{font-size:1.6rem;font-weight:700;margin:.5rem 0 1rem;}
    .err-desc{color:var(--text-muted);max-width:400px;margin:0 auto 2rem;}
  </style>
</head>
<body>
  <div>
    <div class="err-code" aria-hidden="true">404</div>
    <h1 class="err-title">Page Not Found</h1>
    <p class="err-desc">The page you're looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="btn btn-primary btn-lg me-2"><i class="fas fa-home me-2"></i>Go Home</a>
    <a href="index.html#contact" class="btn btn-outline-primary btn-lg"><i class="fas fa-envelope me-2"></i>Contact</a>
  </div>
</body>
</html>
